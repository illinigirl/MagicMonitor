[pytest]
# Tests for the poller Lambda. Run with:
#   cd infra/lambda/poller && pytest
# Or from the repo root:
#   pytest infra/lambda/poller
#
# Lambda's runtime sys.path includes the function root, so production
# imports look like `import weather` and `import db`. The testpath
# convention mirrors that — tests use the same flat imports the Lambda
# uses, with the function root on sys.path via conftest.py.
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
# Quiet collection; print test names + pass/fail clearly.
addopts = -ra -v
