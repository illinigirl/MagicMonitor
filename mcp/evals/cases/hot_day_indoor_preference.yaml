# Third eval case — weather-aware planning.
#
# The user does NOT mention weather in the prompt. The signal lives
# in the get_planning_context response (forecast_high_f: 96, low rain
# chance — a hot dry Florida day with no afternoon storms for shade).
#
# We assert that Claude:
#   1. Calls the standard planning flow tools (history → context → record).
#   2. Records a plan (the prompt signals acceptance with "lock it in").
#   3. Surfaces weather-aware reasoning in the final response — Claude
#      should mention heat/indoor/AC/shade in some form, indicating it
#      *read* the weather summary and let it shape the plan.
#
# Why response_mentions_any instead of response_mentions:
# weather-aware reasoning surfaces in many phrasings. Pinning to a
# single word ("indoor") would fail when Claude says "AC breaks"
# instead. The any-of assertion gives behavioral coverage without
# over-fitting to one phrasing.
#
# Not asserted: the order of indoor vs outdoor rides in ride_sequence.
# That would be too prescriptive — Claude might reasonably cluster
# indoor rides in midday rather than front-load them, and either is a
# defensible weather-aware schedule.

name: hot_day_indoor_preference
description: >
  Verifies Claude reads the weather summary in get_planning_context
  and reflects heat-aware reasoning in its response. User never
  mentions weather — the signal must come from the canned context.

prompt: >
  Plan a day at Magic Kingdom for me tomorrow and lock it in — I
  trust your judgment, so go ahead and record the final order. I'll
  have my husband and sister with me. We like thrill rides but also
  want a few classics like Haunted Mansion and Pirates.

tool_responses:
  get_user_plan_history:
    response:
      plans: []
      calibration_summary:
        sample_size: 0
        usage_hint: >
          No recorded outcomes yet — proceed without calibration
          adjustments and ask the user to report back after the trip.

  get_planning_context:
    response:
      park_key: mk
      park_open_now: true
      park_hours:
        open: "09:00"
        close: "22:00"
        extra_evening_hours: null
      weather_summary:
        forecast_high_f: 96
        forecast_low_f: 76
        rain_chance_pct: 10
      rides:
        - ride_id: tron-lightcycle
          ride_name: TRON Lightcycle / Run
          status: OPERATING
          wait_mins: 75
          forecast:
            typical_wait_now: 80
            confidence: high
        - ride_id: space-mountain
          ride_name: Space Mountain
          status: OPERATING
          wait_mins: 35
          forecast:
            typical_wait_now: 45
            confidence: high
        - ride_id: seven-dwarfs
          ride_name: Seven Dwarfs Mine Train
          status: OPERATING
          wait_mins: 50
          forecast:
            typical_wait_now: 60
            confidence: high
        - ride_id: haunted-mansion
          ride_name: Haunted Mansion
          status: OPERATING
          wait_mins: 25
          forecast:
            typical_wait_now: 30
            confidence: high
        - ride_id: pirates-of-the-caribbean
          ride_name: Pirates of the Caribbean
          status: OPERATING
          wait_mins: 20
          forecast:
            typical_wait_now: 25
            confidence: high
        - ride_id: big-thunder
          ride_name: Big Thunder Mountain Railroad
          status: OPERATING
          wait_mins: 40
          forecast:
            typical_wait_now: 35
            confidence: high
        - ride_id: peter-pan
          ride_name: Peter Pan's Flight
          status: OPERATING
          wait_mins: 65
          forecast:
            typical_wait_now: 60
            confidence: high
        - ride_id: jungle-cruise
          ride_name: Jungle Cruise
          status: OPERATING
          wait_mins: 30
          forecast:
            typical_wait_now: 35
            confidence: high
      currently_down_in_park: []

  record_plan:
    response:
      ok: true
      plan_id: "PLAN#2026-05-25T09:00:00+00:00"
      user_id: megan
      park_key: mk
      expires_at_epoch: 1748192400

assertions:
  - tool_called: get_user_plan_history
  - tool_called: get_planning_context
  - tool_called: record_plan
  - tool_called_in_order:
      - get_planning_context
      - record_plan
  - tool_called_with:
      tool: record_plan
      args_min_length:
        ride_sequence: 5

  # The key behavior under test: Claude surfaced weather-aware
  # reasoning. Any one of these phrasings counts.
  - response_mentions_any:
      - heat
      - hot
      - indoor
      - AC
      - air condition
      - shade
      - midday
      - afternoon sun

  # Accept either form — the user's prompt used "Magic Kingdom" but
  # Claude mirroring the "MK" shorthand back is correct, not a failure
  # (same convention as calibration_aware_planning). The behavior under
  # test here is weather awareness, asserted above; the park reference
  # just confirms Claude engaged with the right park.
  - response_mentions_any:
      - Magic Kingdom
      - MK
  - stop_reason: end_turn
