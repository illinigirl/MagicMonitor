[pytest]
# Tests for the MCP server. Run with:
#   cd mcp && pytest
#
# NOTE: `pytest mcp` from the repo root does NOT respect `testpaths` (that
# only applies when pytest is invoked with no path arg), so it would also
# collect mcp/evals/ — the PAID, LLM-backed eval suite (~$0.45/run, slow).
# `--ignore=evals` in addopts below prevents that even if someone runs
# `pytest mcp`. Run the evals deliberately with `pytest evals/` from mcp/.
#
# Tests target the pure-function helpers inside server.py — the ones
# that don't require an MCP client, AWS connection, or external HTTP.
# Server-side aggregation logic (`_compute_calibration_summary`,
# `_compute_load_vs_forecast`) is the primary value of these tests:
# rigorous numeric verification of the pre-computation pattern that
# the planner relies on. conftest.py handles import-time setup.
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -ra -v --ignore=evals
